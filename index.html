<!doctype html>
<html lang="en" translate="no">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>El Pollo Loco</title>
        <link rel="stylesheet" href="style.css" />

        <script type="module" src="./js/game.js"></script>
    </head>
    <body>
        <h1>El pollo loco</h1>
        <section id="game">
            <canvas id="canvas" width="720" height="480"></canvas>
            <div id="startScreen">
                <img
                    src="img/9_intro_outro_screens/start/startscreen_2.png"
                    alt="Picture of the start screen"
                />
                <button id="startButton">Start</button>
            </div>
            <div id="gameOverScreen" class="displayNone">
                <img src="img/You_won,_you_lost/you_lost_b.png" alt="Picture of the game over screen" />
                <button id="restartButton">Restart</button> 
            </div>
        </section>
    </body>
</html>
