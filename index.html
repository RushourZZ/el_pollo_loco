<!doctype html>
<html lang="en" translate="no">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>El Pollo Loco</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="standard.css" />
        <link
            rel="shortcut icon"
            href="img/3_enemies_chicken/chicken_small/1_walk/1_w.png"
            type="image/x-icon"
        />

        <script type="module" src="./js/game.js"></script>
    </head>
    <body class="content">
        <header>
            <h1>El pollo loco</h1>
        </header>
        <main>
            <section id="game">
                <canvas id="canvas" width="720" height="480"></canvas>
                <div id="startScreen">
                    <img
                        src="img/9_intro_outro_screens/start/startscreen_2.png"
                        alt="Picture of the start screen"
                    />
                    <button id="startButton">Start</button>
                </div>

                <div id="gameOverScreen" class="displayNone">
                    <img
                        src="img/You_won,_you_lost/you_lost_b.png"
                        alt="Picture of the game over screen"
                    />
                    <button id="quitButton">Quit</button>
                </div>
                <div id="gameWonScreen" class="displayNone">
                    <img src="img/You_won,_you_lost/you_won_a.png" alt="Picture of the game won screen">
                    <button id="quitButtonWon">Quit</button>
                </div>
                <button id="muteButton">🔈</button>
            </section>
        </main>
        <footer>
            <p>El pollo loco</p>
            <p>2026</p>
            <a href="./impressum.html">Impressum</a>
        </footer>
    </body>
</html>
